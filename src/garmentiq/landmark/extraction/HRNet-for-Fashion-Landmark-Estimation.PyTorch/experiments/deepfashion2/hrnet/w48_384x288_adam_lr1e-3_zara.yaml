AUTO_RESUME: false  
CUDNN:
  BENCHMARK: true
  DETERMINISTIC: false
  ENABLED: true

DATA_DIR: ''
GPUS: (0,)  # use GPU 0; or change to (1,) if running multi-GPU
OUTPUT_DIR: 'output'
LOG_DIR: 'log'
WORKERS: 4
PRINT_FREQ: 100
PIN_MEMORY: true

DATASET:
  COLOR_RGB: false
  DATASET: 'zara'  # This should match the dataset class name ZaraDataset
  DATA_FORMAT: jpg
  FLIP: false
  NUM_JOINTS_HALF_BODY: 0
  PROB_HALF_BODY: 0.0
  ROOT: 'data/zara/'   # Folder containing your `test/image` subfolder
  TEST_SET: 'test'      # Your image folder is at data/zara/test/image
  TRAIN_SET: ''
  MINI_DATASET: false
  SELECT_CAT: []

MODEL:
  INIT_WEIGHTS: true
  NAME: pose_hrnet
  NUM_JOINTS: 294  # Or change based on your model’s training
  PRETRAINED: ''
  TARGET_TYPE: gaussian
  IMAGE_SIZE: [288, 384]
  HEATMAP_SIZE: [72, 96]
  SIGMA: 2
  EXTRA:
    PRETRAINED_LAYERS:
    - 'conv1'
    - 'bn1'
    - 'conv2'
    - 'bn2'
    - 'layer1'
    - 'transition1'
    - 'stage2'
    - 'transition2'
    - 'stage3'
    - 'transition3'
    - 'stage4'
    FINAL_CONV_KERNEL: 1
    STAGE2:
      NUM_MODULES: 1
      NUM_BRANCHES: 2
      BLOCK: BASIC
      NUM_BLOCKS: [4, 4]
      NUM_CHANNELS: [48, 96]
      FUSE_METHOD: SUM
    STAGE3:
      NUM_MODULES: 4
      NUM_BRANCHES: 3
      BLOCK: BASIC
      NUM_BLOCKS: [4, 4, 4]
      NUM_CHANNELS: [48, 96, 192]
      FUSE_METHOD: SUM
    STAGE4:
      NUM_MODULES: 3
      NUM_BRANCHES: 4
      BLOCK: BASIC
      NUM_BLOCKS: [4, 4, 4, 4]
      NUM_CHANNELS: [48, 96, 192, 384]
      FUSE_METHOD: SUM

LOSS:
  USE_TARGET_WEIGHT: true

TRAIN:
  BATCH_SIZE_PER_GPU: 8
  SHUFFLE: true
  BEGIN_EPOCH: 0
  END_EPOCH: 210
  OPTIMIZER: adam
  LR: 0.001
  LR_FACTOR: 0.1
  LR_STEP: [170, 200]
  WD: 0.
  GAMMA1: 0.99
  GAMMA2: 0.0
  MOMENTUM: 0.9
  NESTEROV: false

TEST:
  BATCH_SIZE_PER_GPU: 1
  USE_GT_BBOX: false  # No annotations in your case
  COCO_BBOX_FILE: ''
  DEEPFASHION2_BBOX_FILE: ''
  BBOX_THRE: 1.0
  IMAGE_THRE: 0.0
  IN_VIS_THRE: 0.2
  MODEL_FILE: ''  # Will be set via --model_file CLI flag
  NMS_THRE: 1.0
  OKS_THRE: 0.9
  FLIP_TEST: false
  POST_PROCESS: true
  SHIFT_HEATMAP: true

DEBUG:
  DEBUG: false
  SAVE_BATCH_IMAGES_GT: false
  SAVE_BATCH_IMAGES_PRED: true  # Optional: visualize results
  SAVE_BATCH_IMAGES_GT_PRED: false
  SAVE_HEATMAPS_GT: false
  SAVE_HEATMAPS_PRED: false
